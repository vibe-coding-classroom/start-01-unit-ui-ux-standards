name: GitHub Classroom Workflow

on: [push]

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  build:
    name: Autograding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Grading Script
        run: chmod +x .github/scripts/check-assignment.sh

      - name: File Integrity Check
        id: checkfiles
        uses: education/autograding-command-grader@v1
        with:
          test-name: FileIntegrity
          command: ./.github/scripts/check-assignment.sh --files
          timeout: 2
          max-score: 20

      - name: HUD Structure Check
        id: checkhud
        uses: education/autograding-command-grader@v1
        with:
          test-name: HUDStructure
          command: ./.github/scripts/check-assignment.sh --hud
          timeout: 2
          max-score: 20

      - name: Design Standards Check
        id: checkdesign
        uses: education/autograding-command-grader@v1
        with:
          test-name: DesignStandards
          command: ./.github/scripts/check-assignment.sh --design
          timeout: 2
          max-score: 30

      - name: UX Research Report Check
        id: checkreport
        uses: education/autograding-command-grader@v1
        with:
          test-name: UXResearchReport
          command: ./.github/scripts/check-assignment.sh --report
          timeout: 2
          max-score: 30

      - name: Autograding Reporter
        uses: education/autograding-grading-reporter@v1
        env:
          CHECKFILES_RESULTS: "${{steps.checkfiles.outputs.result}}"
          CHECKHUD_RESULTS: "${{steps.checkhud.outputs.result}}"
          CHECKDESIGN_RESULTS: "${{steps.checkdesign.outputs.result}}"
          CHECKREPORT_RESULTS: "${{steps.checkreport.outputs.result}}"
        with:
          runners: checkfiles,checkhud,checkdesign,checkreport
