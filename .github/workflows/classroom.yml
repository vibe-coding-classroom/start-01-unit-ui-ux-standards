name: Autograding
on:
  push:
    branches:
      - main
      - master

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  grading:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: File Integrity Check
        id: test1
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: File Integrity
          setup-command: chmod +x .github/scripts/check-assignment.sh
          command: ./.github/scripts/check-assignment.sh --files
          timeout: 1
          max-score: 20

      - name: HUD Structure Check
        id: test2
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: HUD Structure
          setup-command: chmod +x .github/scripts/check-assignment.sh
          command: ./.github/scripts/check-assignment.sh --hud
          timeout: 1
          max-score: 20

      - name: Design Standards Check
        id: test3
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: Design Standards
          setup-command: chmod +x .github/scripts/check-assignment.sh
          command: ./.github/scripts/check-assignment.sh --design
          timeout: 1
          max-score: 30

      - name: UX Research Report Check
        id: test4
        uses: classroom-resources/autograding-command-grader@v1
        with:
          test-name: UX Research Report
          setup-command: chmod +x .github/scripts/check-assignment.sh
          command: ./.github/scripts/check-assignment.sh --report
          timeout: 1
          max-score: 30

      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        with:
          runners: test1,test2,test3,test4
