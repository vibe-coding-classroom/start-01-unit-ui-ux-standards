name: Autograding
on:
  push:
    branches:
      - main
      - master

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  grading:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: File Integrity Check
        id: check-files
        uses: education/autograding-command-grader@v1
        with:
          test-name: File Integrity
          setup-command: chmod +x .github/scripts/check_assignment.sh
          command: ./.github/scripts/check_assignment.sh --files
          timeout: 1
          max-score: 20

      - name: HUD Structure Check
        id: check-hud
        uses: education/autograding-command-grader@v1
        with:
          test-name: HUD Structure
          setup-command: chmod +x .github/scripts/check_assignment.sh
          command: ./.github/scripts/check_assignment.sh --hud
          timeout: 1
          max-score: 20

      - name: Design Standards Check
        id: check-design
        uses: education/autograding-command-grader@v1
        with:
          test-name: Design Standards
          setup-command: chmod +x .github/scripts/check_assignment.sh
          command: ./.github/scripts/check_assignment.sh --design
          timeout: 1
          max-score: 30

      - name: UX Research Report Check
        id: check-report
        uses: education/autograding-command-grader@v1
        with:
          test-name: UX Research Report
          setup-command: chmod +x .github/scripts/check_assignment.sh
          command: ./.github/scripts/check_assignment.sh --report
          timeout: 1
          max-score: 30

      - name: Autograding Reporter
        uses: education/autograding-grading-reporter@v1
        with:
          runners: check-files,check-hud,check-design,check-report
